<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoviesBook</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>MoviesBook</h1>
    <div id="films-grid"></div>
    <div id="loader">Chargement...</div>

    <!-- Modal pour détail film -->
    <div id="modal-test" style="display:none;position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.4);z-index:2000;align-items:center;justify-content:center;">
        <div style="background:#fff;padding:2rem 2.5rem;border-radius:12px;max-width:350px;margin:10vh auto;text-align:center;">
            <span id="modal-test-close" style="position:absolute;top:18px;right:32px;font-size:2rem;cursor:pointer;">&times;</span>
            <div id="modal-test-content">Ceci est un test de modal !</div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
